name: FirefoxWASMiOS
options:
  bundleIdPrefix: com.axoledstudent
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
targets:
  FirefoxWASMiOS:
    type: application
    platform: iOS
    sources:
      - path: FirefoxWASMiOS
    info:
      path: FirefoxWASMiOS/Info.plist
    entitlements:
      path: FirefoxWASMiOS/FirefoxWASMiOS.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.axoledstudent.firefoxwasm
        PRODUCT_NAME: FirefoxWASM
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: false
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
schemes:
  FirefoxWASMiOS:
    build:
      targets:
        FirefoxWASMiOS: all
    run:
      config: Debug
    archive:
      config: Release
