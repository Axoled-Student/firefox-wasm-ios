name: Deploy Firefox WASM web app

on:
  push:
    branches: [main]
    paths:
      - "public/firefox/**"
      - "tests/web-app.test.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Validate web app
        run: |
          npm ci
          npm run test:web
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public/firefox
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
