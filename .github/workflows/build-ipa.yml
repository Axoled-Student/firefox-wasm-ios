name: Build unsigned iPadOS IPA

on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - "public/firefox/**"
      - ".github/workflows/build-ipa.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec ios/project.yml

      - name: Build device app without a provisioning profile
        run: |
          xcodebuild \
            -project ios/FirefoxWASMiOS.xcodeproj \
            -scheme FirefoxWASMiOS \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            build

      - name: Package unsigned IPA and JIT entitlement template
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/FirefoxWASM.app"
          test -d "$APP_PATH"
          cp ios/FirefoxWASMiOS/FirefoxWASMiOS.entitlements build/requested-entitlements.plist
          /usr/bin/plutil -lint build/requested-entitlements.plist
          python3 - <<'PY'
          import plistlib
          from pathlib import Path

          with Path("build/requested-entitlements.plist").open("rb") as stream:
              entitlements = plistlib.load(stream)
          with Path("build/DerivedData/Build/Products/Release-iphoneos/FirefoxWASM.app/Info.plist").open("rb") as stream:
              info = plistlib.load(stream)

          assert entitlements.get("get-task-allow") is True
          assert info.get("UIDeviceFamily") == [1, 2]
          assert info.get("CFBundleShortVersionString") == "1.0.3"
          assert info.get("CFBundleVersion") == "4"
          assert info.get("UIApplicationSupportsIndirectInputEvents") is True
          assert "zh-Hant" in info.get("CFBundleLocalizations", [])
          assert info.get("UILaunchStoryboardName") == "LaunchScreen"

          app = Path("build/DerivedData/Build/Products/Release-iphoneos/FirefoxWASM.app")
          bundled = app / "firefox"
          assert (bundled / "index.html").is_file()
          assert (bundled / "gecko.wasm.zst").stat().st_size == 37_892_603
          assert (bundled / "chrome-assets.tar.zst").stat().st_size > 40_000_000
          PY
          mkdir -p build/ipa/Payload
          /usr/bin/ditto "$APP_PATH" build/ipa/Payload/FirefoxWASM.app
          (
            cd build/ipa
            /usr/bin/zip -qry ../FirefoxWASM-iPadOS27-unsigned.ipa Payload
          )
          test "$(stat -f%z build/FirefoxWASM-iPadOS27-unsigned.ipa)" -gt 75000000
          shasum -a 256 build/FirefoxWASM-iPadOS27-unsigned.ipa > build/FirefoxWASM-iPadOS27-unsigned.ipa.sha256

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FirefoxWASM-iPadOS27-unsigned
          path: |
            build/FirefoxWASM-iPadOS27-unsigned.ipa
            build/FirefoxWASM-iPadOS27-unsigned.ipa.sha256
            build/requested-entitlements.plist
          if-no-files-found: error
          compression-level: 0
