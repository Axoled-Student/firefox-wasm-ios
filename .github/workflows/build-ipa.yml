name: Build unsigned iPadOS IPA

on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/build-ipa.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec ios/project.yml

      - name: Build device app without a provisioning profile
        run: |
          xcodebuild \
            -project ios/FirefoxWASMiOS.xcodeproj \
            -scheme FirefoxWASMiOS \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            build

      - name: Add JIT metadata and package IPA
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/FirefoxWASM.app"
          EXECUTABLE="$APP_PATH/FirefoxWASM"
          test -d "$APP_PATH"
          test -f "$EXECUTABLE"
          /usr/bin/codesign --force --sign - \
            --entitlements ios/FirefoxWASMiOS/FirefoxWASMiOS.entitlements \
            --generate-entitlement-der "$EXECUTABLE"
          /usr/bin/codesign -d --entitlements :- "$EXECUTABLE" > build/entitlements.plist
          /usr/bin/plutil -extract get-task-allow raw -o - build/entitlements.plist | grep -qx true
          mkdir -p build/ipa/Payload
          /usr/bin/ditto "$APP_PATH" build/ipa/Payload/FirefoxWASM.app
          (
            cd build/ipa
            /usr/bin/zip -qry ../FirefoxWASM-iPadOS27-unsigned.ipa Payload
          )
          shasum -a 256 build/FirefoxWASM-iPadOS27-unsigned.ipa > build/FirefoxWASM-iPadOS27-unsigned.ipa.sha256

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FirefoxWASM-iPadOS27-unsigned
          path: |
            build/FirefoxWASM-iPadOS27-unsigned.ipa
            build/FirefoxWASM-iPadOS27-unsigned.ipa.sha256
            build/entitlements.plist
          if-no-files-found: error
          compression-level: 0
